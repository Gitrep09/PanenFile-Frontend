<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PanenFile - The Final Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #32CD32; 
            --bg: #000000;      
            --surface: #121212; 
            --text: #ffffff;
            --accent: #1e1e1e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo { width: 150px; animation: logoIntro 1.5s ease-out forwards; filter: drop-shadow(0 0 20px var(--primary)); }
        .splash-text { margin-top: 20px; color: var(--primary); font-weight: bold; letter-spacing: 5px; text-transform: uppercase; opacity: 0; animation: fadeIn 1s ease-in 0.8s forwards; }

        @keyframes logoIntro { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { to { opacity: 1; } }
        .fade-out { opacity: 0; visibility: hidden; }

        /* --- MAIN APP --- */
        #main-app {
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
            height: 100vh;
            overflow-y: auto;
        }
        .app-visible { opacity: 1 !important; }

        .header { text-align: center; margin-bottom: 24px; }
        .header img { width: 80px; filter: drop-shadow(0 0 10px var(--primary)); }
        .header h1 { color: var(--primary); font-size: 24px; margin: 10px 0 0; text-transform: uppercase; letter-spacing: 2px; }

        .card {
            background-color: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 16px;
        }

        .label { display: block; margin-bottom: 8px; font-size: 14px; color: #888; }

        .input-group { position: relative; margin-bottom: 20px; }
        input[type="text"] {
            width: 100%; background: var(--bg); border: 2px solid var(--accent);
            border-radius: 12px; padding: 14px 45px 14px 14px; color: white;
            font-size: 16px; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary); }
        .input-group i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); transition: 0.3s; }

        /* DYNAMIC RESOLUTION GRID */
        .res-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .res-item {
            background: var(--bg); border: 1px solid var(--accent); padding: 12px;
            border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold;
            transition: 0.3s; color: #666;
        }
        .res-item.active { background: var(--primary); color: var(--bg); border-color: var(--primary); transform: scale(1.05); }
        .res-item.available { color: white; border-color: #333; }

        .btn-panen {
            width: 100%; background-color: var(--primary); color: var(--bg);
            border: none; border-radius: 12px; padding: 16px; font-size: 16px;
            font-weight: 800; cursor: pointer; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-panen:disabled { background-color: #333; color: #555; }

        #progress-box { display: none; margin-top: 15px; text-align: center; }
        .progress-bar-bg { background: var(--bg); height: 8px; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { background: var(--primary); width: 0%; height: 100%; transition: width 0.3s; box-shadow: 0 0 10px var(--primary); }
        .status-text { font-size: 12px; color: var(--primary); font-family: monospace; }

        .history-title { width: 100%; max-width: 400px; display: flex; justify-content: space-between; color: #888; font-size: 14px; margin-bottom: 10px; padding: 0 5px; }
        .history-list { width: 100%; max-width: 400px; }
        .history-item {
            background: var(--surface); padding: 12px; border-radius: 10px; margin-bottom: 8px;
            display: flex; align-items: center; font-size: 13px; border-left: 3px solid var(--primary);
            cursor: pointer;
        }
        .history-item i { margin-right: 10px; color: var(--primary); }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://dl.dropbox.com/scl/fi/id00rjzt9bwb1mo0elvlg/1779085439593.png?rlkey=kbl6sc0m6goxn1jh79h4dr4ix&st=kn9b7eta&dl=1" class="splash-logo">
        <div class="splash-text">PanenFile</div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="https://dl.dropbox.com/scl/fi/id00rjzt9bwb1mo0elvlg/1779085439593.png?rlkey=kbl6sc0m6goxn1jh79h4dr4ix&st=kn9b7eta&dl=1" alt="Logo">
            <h1>PanenFile</h1>
        </div>

        <div class="card">
            <span class="label">Link Video (TikTok/IG/X/FB)</span>
            <div class="input-group">
                <input type="text" id="videoUrl" placeholder="Tempel link di sini..." autocomplete="off">
                <i id="linkIcon" class="fas fa-link"></i>
            </div>

            <span class="label" id="resLabel">Resolusi Tersedia</span>
            <div class="res-grid" id="resGrid">
                </div>

            <button class="btn-panen" id="btnPanen">Mulai Panen</button>

            <div id="progress-box">
                <div class="status-text" id="statusLabel">Menganalisis...</div>
                <div class="progress-bar-bg">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="status-text" id="statusPercent">0%</div>
            </div>
        </div>

        <div class="history-title">
            <span>Riwayat Panen</span>
            <span onclick="clearHistory()" style="color:var(--primary); cursor:pointer;">Hapus</span>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let selectedRes = "";
        const urlInput = document.getElementById('videoUrl');
        const resGrid = document.getElementById('resGrid');
        const linkIcon = document.getElementById('linkIcon');

        // Database Resolusi per Platform
        const platformConfig = {
            tiktok: ["360p", "576p", "720p", "1080p"],
            instagram: ["720p", "1080p"],
            twitter: ["360p", "720p"],
            x: ["360p", "720p"],
            facebook: ["360p", "720p", "1080p"],
            default: ["360p", "720p", "1080p", "4K"]
        };

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('fade-out');
                document.getElementById('main-app').classList.add('app-visible');
            }, 2500);
            updateResGrid('default'); // Load default res
            renderHistory();
        });

        // Deteksi Perubahan Link
        urlInput.addEventListener('input', (e) => {
            const url = e.target.value.toLowerCase();
            let platform = 'default';

            if (url.includes('tiktok.com')) { platform = 'tiktok'; linkIcon.className = 'fab fa-tiktok'; }
            else if (url.includes('instagram.com')) { platform = 'instagram'; linkIcon.className = 'fab fa-instagram'; }
            else if (url.includes('facebook.com') || url.includes('fb.watch')) { platform = 'facebook'; linkIcon.className = 'fab fa-facebook'; }
            else if (url.includes('twitter.com') || url.includes('x.com')) { platform = 'x'; linkIcon.className = 'fab fa-twitter'; }
            else { platform = 'default'; linkIcon.className = 'fas fa-link'; }

            updateResGrid(platform);
        });

        function updateResGrid(platform) {
            resGrid.innerHTML = '';
            const options = platformConfig[platform];
            
            options.forEach((res, index) => {
                const item = document.createElement('div');
                item.className = 'res-item available';
                if (res === "720p" || options.length === 1) { 
                    item.classList.add('active'); 
                    selectedRes = res; 
                }
                item.innerText = res;
                item.onclick = () => {
                    document.querySelectorAll('.res-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    selectedRes = res;
                };
                resGrid.appendChild(item);
            });
        }

        document.getElementById('btnPanen').onclick = function() {
            const url = urlInput.value.trim();
            if(!url) return tg.showAlert("Masukkan link dulu!");
            if(url.includes("youtube") || url.includes("youtu.be")) return tg.showAlert("YouTube tidak didukung.");

            this.disabled = true;
            document.getElementById('progress-box').style.display = 'block';
            
            let progress = 0;
            const pb = document.getElementById('progressBar');
            const sl = document.getElementById('statusLabel');
            const sp = document.getElementById('statusPercent');

            const timer = setInterval(() => {
                progress += Math.floor(Math.random() * 7) + 1;
                if(progress > 100) progress = 100;
                pb.style.width = progress + "%";
                sp.innerText = progress + "%";

                if(progress < 30) sl.innerText = "🔍 Menganalisis Video...";
                else if(progress < 70) sl.innerText = "🛡️ Menembus Proteksi " + selectedRes + "...";
                else sl.innerText = "🚀 Mengirim ke PanenEngine...";

                if(progress === 100) {
                    clearInterval(timer);
                    saveHistory(url);
                    setTimeout(() => {
                        tg.sendData(JSON.stringify({ url: url, resolution: selectedRes }));
                        tg.close();
                    }, 500);
                }
            }, 120);
        };

        function saveHistory(url) {
            let h = JSON.parse(localStorage.getItem('h_panen') || '[]');
            if(!h.includes(url)) {
                h.unshift(url);
                localStorage.setItem('h_panen', JSON.stringify(h.slice(0, 5)));
                renderHistory();
            }
        }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('h_panen') || '[]');
            const container = document.getElementById('historyList');
            container.innerHTML = h.length ? '' : '<p style="text-align:center;color:#444;font-size:12px;">Belum ada riwayat panen</p>';
            h.forEach(u => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<i class="fas fa-history"></i><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u}</span>`;
                div.onclick = () => {
                    urlInput.value = u;
                    urlInput.dispatchEvent(new Event('input'));
                };
                container.appendChild(div);
            });
        }

        function clearHistory() {
            localStorage.removeItem('h_panen');
            renderHistory();
        }
    </script>
</body>
</html>
