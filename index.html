<!DOCTYPE html>
<html lang="id-ID" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="PanenFile - Video Downloader Multi-Platform">
    <title>PanenFile • Enterprise Video Downloader</title>

    <script src="https://cdn.tailwindcss.com" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --tg-theme-bg-color: #0a0a0a;
            --tg-theme-text-color: #f0f0f0;
            --tg-theme-hint-color: #9e9e9e;
            --tg-theme-link-color: #4ade80;
            --tg-theme-button-color: #10b981;
            --tg-theme-button-text-color: #0a0a0a;
            --tg-theme-secondary-bg-color: #1e1e1e;
            
            --radius-soft: 12px;
            --radius-medium: 18px;
            --radius-hard: 24px;
            --radius-pill: 9999px;
            --transition-fast: 0.2s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            
            --z-sticky: 80;
            --z-overlay: 100;
            --z-modal: 200;
            --z-toast: 300;
            --z-splash: 999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        html, body { width: 100%; height: 100%; overflow-x: hidden; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        ::-webkit-scrollbar { display: none; }

        @keyframes bounceIn { 0% { transform: scale(0.6); opacity: 0; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes mainUIFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spinLoader { to { transform: rotate(360deg); } }
        @keyframes shimmerProgress { to { background-position: 200% 0; } }

        #splash-screen { position: fixed; inset: 0; z-index: var(--z-splash); display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--tg-theme-bg-color); transition: opacity 0.5s; }
        #splash-logo { width: 120px; height: 120px; border-radius: 24px; animation: bounceIn 0.8s forwards; }
        #splash-spinner { margin-top: 24px; width: 40px; height: 40px; border: 3px solid var(--tg-theme-secondary-bg-color); border-top-color: var(--tg-theme-button-color); border-radius: 50%; animation: spinLoader 0.8s linear infinite; }

        #main-app { display: none; flex-direction: column; min-height: 100vh; max-width: 480px; margin: 0 auto; padding: 16px 20px; animation: mainUIFadeIn 0.5s ease forwards; }
        #main-app.visible { display: flex; }

        .url-input-container { display: flex; align-items: center; background: var(--tg-theme-secondary-bg-color); border-radius: var(--radius-medium); padding: 4px; border: 2px solid transparent; transition: border 0.2s; }
        .url-input-container:focus-within { border-color: var(--tg-theme-button-color); }
        .main-url-input { flex: 1; border: none; background: transparent; padding: 16px; font-size: 15px; color: var(--tg-theme-text-color); outline: none; }
        .clipboard-btn { background: transparent; border: none; color: var(--tg-theme-link-color); padding: 12px; font-size: 18px; cursor: pointer; }

        .resolution-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 10px; margin-top: 12px; }
        .resolution-chip { padding: 10px 8px; border-radius: var(--radius-soft); border: 2px solid var(--tg-theme-secondary-bg-color); background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); font-weight: 600; font-size: 13px; text-align: center; cursor: pointer; transition: 0.2s; }
        .resolution-chip.selected { border-color: var(--tg-theme-button-color); background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }

        .html-download-btn { width: 100%; padding: 16px; border-radius: var(--radius-medium); font-weight: 700; font-size: 16px; border: none; cursor: pointer; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); margin-top: 24px; transition: 0.2s; }
        .html-download-btn:disabled { opacity: 0.5; pointer-events: none; }
        
        .visual-progress-container { width: 100%; height: 6px; background: var(--tg-theme-secondary-bg-color); border-radius: var(--radius-pill); overflow: hidden; margin-top: 8px; display: none; }
        .visual-progress-fill { height: 100%; width: 0%; background: var(--tg-theme-button-color); transition: width 0.3s; }

        #environment-badge { position: fixed; bottom: 16px; left: 16px; font-size: 11px; padding: 6px 12px; border-radius: var(--radius-pill); background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-hint-color); }
    </style>
</head>
<body>

<div id="splash-screen">
    <img id="splash-logo" src="https://dl.dropbox.com/scl/fi/w6nl3b1kcm4jtsblsg2k1/1779056869501.png?rlkey=o3g85l6v19dqvj8twm9gbgkh8&st=qde9zvqy&dl=1" alt="Logo">
    <div id="splash-spinner"></div>
</div>

<div id="main-app">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;">
        <i class="fa-solid fa-cloud-arrow-down" style="font-size:24px;color:var(--tg-theme-link-color);"></i>
        <h1 style="font-size:22px;font-weight:800;color:var(--tg-theme-text-color);">PanenFile</h1>
    </div>

    <label style="font-weight:600;font-size:13px;color:var(--tg-theme-hint-color);margin-bottom:8px;">Tempel tautan video</label>
    <div class="url-input-container">
        <input type="url" id="input-main-url" class="main-url-input" placeholder="https://youtube.com/watch?v=..." autocomplete="off">
        <button class="clipboard-btn" id="btn-clipboard"><i class="fa-solid fa-paste"></i></button>
        <button class="clipboard-btn" id="btn-clear-url" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <p id="helper-detection-text" style="font-size:12px;color:var(--tg-theme-link-color);margin-top:8px;min-height:16px;font-weight:600;"></p>

    <div style="margin-top:24px;">
        <p style="font-weight:600;font-size:13px;color:var(--tg-theme-hint-color);">Pilih Resolusi</p>
        <div class="resolution-grid" id="resolution-grid-container"></div>
    </div>

    <div class="visual-progress-container" id="visual-progress-container"><div class="visual-progress-fill" id="visual-progress-fill"></div></div>

    <button id="html-download-btn" class="html-download-btn" disabled>Unduh Sekarang</button>
    <div id="environment-badge">Mendeteksi...</div>
</div>

<script>
    // PERBAIKAN 1: Deteksi Telegram yang Benar (Tidak bergantung pada initDataUnsafe.user)
    const TelegramWebAppInstance = window.Telegram?.WebApp || null;
    const isRunningInsideTelegram = TelegramWebAppInstance && TelegramWebAppInstance.platform && TelegramWebAppInstance.platform !== "unknown";

    if (isRunningInsideTelegram) {
        TelegramWebAppInstance.ready();
        TelegramWebAppInstance.expand();
        applyTheme();
    }

    document.getElementById('environment-badge').textContent = isRunningInsideTelegram ? '📱 Berjalan di Telegram' : '🌐 Browser (Mode Uji Coba)';
    document.getElementById('environment-badge').style.color = isRunningInsideTelegram ? 'var(--tg-theme-link-color)' : 'var(--tg-theme-hint-color)';

    let state = { url: '', platform: null, resolution: '', downloading: false };

    // Logika Deteksi Platform
    function detectPlatform(url) {
        const u = url.toLowerCase();
        if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
        if (u.includes('instagram.com')) return 'instagram';
        if (u.includes('tiktok.com')) return 'tiktok';
        if (u.includes('bilibili.com')) return 'bilibili';
        return null;
    }

    // Update UI berdasarkan State
    function renderUI() {
        document.getElementById('btn-clear-url').style.display = state.url ? 'block' : 'none';
        
        // Helper text
        const hText = document.getElementById('helper-detection-text');
        if (state.platform === 'youtube') hText.innerHTML = '<i class="fa-brands fa-youtube"></i> YouTube terdeteksi';
        else if (state.platform === 'instagram') hText.innerHTML = '<i class="fa-brands fa-instagram"></i> Instagram terdeteksi';
        else if (state.platform === 'tiktok') hText.innerHTML = '<i class="fa-brands fa-tiktok"></i> TikTok terdeteksi';
        else if (state.platform === 'bilibili') hText.innerHTML = '<i class="fa-solid fa-tv"></i> Bilibili terdeteksi';
        else hText.innerHTML = '';

        // Resolusi Grid
        const grid = document.getElementById('resolution-grid-container');
        const resList = state.platform ? ['480p','720p','1080p'] : []; // Disederhanakan untuk contoh
        if(state.platform === 'youtube') resList.push('1440p', '4K');
        
        grid.innerHTML = '';
        resList.forEach(r => {
            const btn = document.createElement('button');
            btn.className = `resolution-chip ${state.resolution === r ? 'selected' : ''}`;
            btn.textContent = r;
            btn.onclick = () => { state.resolution = r; renderUI(); };
            grid.appendChild(btn);
        });

        // Tombol Download
        const btnDL = document.getElementById('html-download-btn');
        const isValid = state.url && state.platform && state.resolution;
        btnDL.disabled = !isValid || state.downloading;
        btnDL.textContent = state.downloading ? 'Mengirim data...' : 'Unduh Sekarang';

        // Update MainButton Telegram jika ada
        if (isRunningInsideTelegram && TelegramWebAppInstance.MainButton) {
            const mb = TelegramWebAppInstance.MainButton;
            if (isValid && !state.downloading) {
                mb.setText('UNDUH SEKARANG');
                mb.enable(); mb.show();
            } else {
                mb.hide();
            }
        }
    }

    // Event Listeners Input
    document.getElementById('input-main-url').addEventListener('input', e => {
        state.url = e.target.value;
        state.platform = detectPlatform(state.url);
        state.resolution = ''; // Reset resolusi saat link diganti
        renderUI();
    });

    document.getElementById('btn-clear-url').addEventListener('click', () => {
        document.getElementById('input-main-url').value = '';
        state.url = ''; state.platform = null; state.resolution = '';
        renderUI();
    });

    document.getElementById('btn-clipboard').addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            if(text) {
                document.getElementById('input-main-url').value = text;
                state.url = text; state.platform = detectPlatform(text); state.resolution = '';
                renderUI();
            }
        } catch(e) {}
    });

    // PERBAIKAN 2: Logika Pengiriman Data (Eksekusi Cepat tanpa Fake Loading kelamaan)
    async function processDownload() {
        if (!state.url || !state.resolution || state.downloading) return;
        state.downloading = true; renderUI();

        document.getElementById('visual-progress-container').style.display = 'block';
        document.getElementById('visual-progress-fill').style.width = '100%';

        // Jeda animasi sekejap agar terlihat mulus
        await new Promise(r => setTimeout(r, 600));

        // Format data yang diminta bot Python kamu
        const payloadData = {
            url: state.url,
            resolution: state.resolution
        };

        if (isRunningInsideTelegram) {
            // MENGIRIM DATA DAN MENUTUP MINI APP SECARA OTOMATIS
            TelegramWebAppInstance.sendData(JSON.stringify(payloadData));
        } else {
            // Jika dites di Browser biasa
            alert("✅ DATA BERHASIL DIKIRIM!\n\n(Ini mode browser. Jika di Telegram, jendela ini akan otomatis tertutup dan bot akan memproses video).");
            state.downloading = false; 
            document.getElementById('visual-progress-container').style.display = 'none';
            document.getElementById('visual-progress-fill').style.width = '0%';
            renderUI();
        }
    }

    document.getElementById('html-download-btn').addEventListener('click', processDownload);
    if(TelegramWebAppInstance?.MainButton) TelegramWebAppInstance.MainButton.onClick(processDownload);

    // Styling Otomatis dari Tema Telegram
    function applyTheme() {
        const p = TelegramWebAppInstance.themeParams;
        if(p && p.bg_color) {
            document.documentElement.style.setProperty('--tg-theme-bg-color', p.bg_color);
            document.documentElement.style.setProperty('--tg-theme-text-color', p.text_color);
            document.documentElement.style.setProperty('--tg-theme-hint-color', p.hint_color);
            document.documentElement.style.setProperty('--tg-theme-link-color', p.link_color);
            document.documentElement.style.setProperty('--tg-theme-button-color', p.button_color);
            document.documentElement.style.setProperty('--tg-theme-button-text-color', p.button_text_color);
            document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', p.secondary_bg_color);
        }
    }

    // Hilangkan Splash Screen saat dimuat
    setTimeout(() => {
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
        document.getElementById('main-app').classList.add('visible');
    }, 1200);

</script>
</body>
</html>
