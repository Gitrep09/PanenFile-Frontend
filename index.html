<!DOCTYPE html>
<html lang="id-ID" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>PanenFile • Enterprise Video Downloader</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --tg-theme-bg-color: #0a0a0a;
            --tg-theme-text-color: #f0f0f0;
            --tg-theme-hint-color: #9e9e9e;
            --tg-theme-link-color: #4ade80;
            --tg-theme-button-color: #10b981;
            --tg-theme-button-text-color: #0a0a0a;
            --tg-theme-secondary-bg-color: #1e1e1e;
            --radius-medium: 18px;
            --z-splash: 999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); overflow-x: hidden; }
        
        #splash-screen { position: fixed; inset: 0; z-index: var(--z-splash); display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--tg-theme-bg-color); transition: opacity 0.5s; }
        #splash-logo { width: 120px; height: 120px; border-radius: 24px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        #main-app { display: none; opacity: 0; transition: opacity 0.5s; flex-direction: column; min-height: 100vh; max-width: 480px; margin: 0 auto; padding: 20px; }
        #main-app.visible { display: flex; opacity: 1; }

        .input-box { display: flex; align-items: center; background: var(--tg-theme-secondary-bg-color); border-radius: var(--radius-medium); padding: 4px; border: 2px solid transparent; transition: 0.2s; }
        .input-box:focus-within { border-color: var(--tg-theme-button-color); }
        .main-input { flex: 1; border: none; background: transparent; padding: 16px; font-size: 15px; color: var(--tg-theme-text-color); outline: none; }
        
        .res-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 12px; }
        .res-chip { padding: 12px 8px; border-radius: 12px; border: 2px solid var(--tg-theme-secondary-bg-color); background: transparent; color: var(--tg-theme-text-color); font-weight: 600; font-size: 13px; text-align: center; cursor: pointer; transition: 0.2s; }
        .res-chip.selected { border-color: var(--tg-theme-button-color); background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }

        .dl-btn { width: 100%; padding: 18px; border-radius: var(--radius-medium); font-weight: 700; font-size: 16px; border: none; cursor: pointer; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); margin-top: 30px; transition: 0.2s; }
        .dl-btn:disabled { opacity: 0.4; transform: scale(0.98); }

        #env-badge { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); font-size: 10px; padding: 5px 12px; border-radius: 20px; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-hint-color); }
    </style>
</head>
<body>

<div id="splash-screen">
    <img id="splash-logo" src="https://dl.dropbox.com/scl/fi/w6nl3b1kcm4jtsblsg2k1/1779056869501.png?rlkey=o3g85l6v19dqvj8twm9gbgkh8&st=qde9zvqy&dl=1" alt="Logo">
    <div style="margin-top:20px; border: 3px solid #1e1e1e; border-top-color: #10b981; width:30px; height:30px; border-radius:50%; animation: spin 0.8s linear infinite;"></div>
</div>

<div id="main-app">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:30px;">
        <i class="fa-solid fa-cloud-arrow-down" style="font-size:28px; color:var(--tg-theme-link-color);"></i>
        <h1 style="font-size:24px; font-weight:800;">PanenFile</h1>
    </div>

    <label style="font-weight:600; font-size:13px; color:var(--tg-theme-hint-color); margin-bottom:8px; display:block;">Tempel tautan video</label>
    <div class="input-box">
        <input type="url" id="input-url" class="main-input" placeholder="YouTube, TikTok, IG, X, FB..." autocomplete="off">
        <button id="btn-paste" style="background:none; border:none; color:var(--tg-theme-link-color); padding:12px; font-size:18px;"><i class="fa-solid fa-paste"></i></button>
    </div>
    
    <p id="platform-info" style="font-size:12px; color:var(--tg-theme-link-color); margin-top:10px; font-weight:700; min-height:18px;"></p>

    <div style="margin-top:25px;">
        <p style="font-weight:600; font-size:13px; color:var(--tg-theme-hint-color); margin-bottom:10px;">Pilih Resolusi</p>
        <div class="res-grid" id="res-grid"></div>
    </div>

    <button id="btn-download" class="dl-btn" disabled>Unduh Sekarang</button>
    
    <div id="env-badge">Mendeteksi Sistem...</div>
</div>

<script>
    const tg = window.Telegram?.WebApp || null;
    const isTg = tg && tg.platform && tg.platform !== "unknown";

    if (isTg) {
        tg.ready();
        tg.expand();
        // Terapkan warna tema Telegram
        const p = tg.themeParams;
        if(p.bg_color) document.documentElement.style.setProperty('--tg-theme-bg-color', p.bg_color);
        if(p.button_color) document.documentElement.style.setProperty('--tg-theme-button-color', p.button_color);
    }

    document.getElementById('env-badge').textContent = isTg ? '📱 Berjalan di Telegram' : '🌐 Mode Browser';

    let state = { url: '', platform: null, resolution: '' };

    // FIX: Radar deteksi platform lengkap (YouTube, IG, TikTok, Bilibili, X, FB)
    function detectPlatform(url) {
        const u = url.toLowerCase();
        if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
        if (u.includes('instagram.com')) return 'instagram';
        if (u.includes('tiktok.com')) return 'tiktok';
        if (u.includes('bilibili.com')) return 'bilibili';
        if (u.includes('x.com') || u.includes('twitter.com')) return 'twitter';
        if (u.includes('facebook.com') || u.includes('fb.watch')) return 'facebook';
        return null;
    }

    function render() {
        state.platform = detectPlatform(state.url);
        const info = document.getElementById('platform-info');
        
        // Update Tampilan Radar
        const icons = {
            youtube: '<i class="fa-brands fa-youtube"></i> YouTube Terdeteksi',
            instagram: '<i class="fa-brands fa-instagram"></i> Instagram Terdeteksi',
            tiktok: '<i class="fa-brands fa-tiktok"></i> TikTok Terdeteksi',
            bilibili: '<i class="fa-solid fa-tv"></i> Bilibili Terdeteksi',
            twitter: '<i class="fa-brands fa-x-twitter"></i> X / Twitter Terdeteksi',
            facebook: '<i class="fa-brands fa-facebook"></i> Facebook Terdeteksi'
        };
        info.innerHTML = icons[state.platform] || '';

        // Update Grid Resolusi
        const grid = document.getElementById('res-grid');
        grid.innerHTML = '';
        const options = state.platform ? ['480p', '720p', '1080p'] : [];
        if(state.platform === 'youtube') options.push('1440p', '4K');

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = `res-chip ${state.resolution === opt ? 'selected' : ''}`;
            btn.textContent = opt;
            btn.onclick = () => { state.resolution = opt; render(); };
            grid.appendChild(btn);
        });

        // Update Tombol Utama
        const btn = document.getElementById('btn-download');
        btn.disabled = !(state.url && state.platform && state.resolution);
    }

    document.getElementById('input-url').addEventListener('input', (e) => {
        state.url = e.target.value;
        render();
    });

    document.getElementById('btn-paste').onclick = async () => {
        const text = await navigator.clipboard.readText();
        if(text) {
            document.getElementById('input-url').value = text;
            state.url = text;
            render();
        }
    };

    // FUNGSI KRUSIAL: Mengirim data ke Bot & Menutup Jendela
    document.getElementById('btn-download').onclick = () => {
        const payload = { url: state.url, resolution: state.resolution };
        
        if (isTg) {
            tg.sendData(JSON.stringify(payload));
        } else {
            alert("Berhasil! (Browser Mode)\nData: " + JSON.stringify(payload));
        }
    };

    // Splash Screen Timer
    setTimeout(() => {
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-app').classList.add('visible');
        }, 500);
    }, 1500);

</script>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
